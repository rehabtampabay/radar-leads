<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RADAR — Pasco County</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:#dce1ec;color:#111827;font-size:13px;min-height:100vh;}
a{color:#2563eb;text-decoration:none;}a:hover{text-decoration:underline;}

/* ── HEADER ── */
.header{background:#0f172a;padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;gap:16px;position:sticky;top:0;z-index:300;}
.logo{font-size:.95rem;font-weight:700;color:#fff;letter-spacing:.3px;display:flex;align-items:center;gap:8px;}
.logo-dot{width:8px;height:8px;border-radius:50%;background:#3b82f6;}
.header-right{display:flex;align-items:center;gap:8px;}
.hbtn{font-size:.72rem;font-weight:600;padding:5px 11px;border-radius:6px;cursor:pointer;border:none;transition:.12s;}
.hbtn-ghost{background:rgba(255,255,255,.1);color:#cbd5e1;border:1px solid rgba(255,255,255,.15);}
.hbtn-ghost:hover{background:rgba(255,255,255,.18);color:#fff;}
#autosave{font-size:.7rem;color:#34d399;display:none;}

/* ── TOOLBAR ── */
.toolbar{background:#f8f9fc;border-bottom:1px solid #cdd3e0;padding:6px 16px;display:flex;align-items:center;gap:5px;flex-wrap:nowrap;overflow-x:auto;position:sticky;top:52px;z-index:200;}
.toolbar input{border:1px solid #d1d5db;border-radius:7px;padding:5px 9px;font-size:.76rem;width:148px;background:#f9fafb;outline:none;transition:.15s;flex-shrink:0;}
.toolbar input:focus{border-color:#3b82f6;background:#fff;box-shadow:0 0 0 3px rgba(59,130,246,.12);}
.toolbar select{border:1px solid #d1d5db;border-radius:7px;padding:4px 7px;font-size:.74rem;background:#f9fafb;color:#374151;cursor:pointer;outline:none;flex-shrink:0;}
.toolbar select:focus{border-color:#3b82f6;}
.tb-sep{width:1px;height:20px;background:#e5e7eb;flex-shrink:0;}
.tb-count{margin-left:auto;font-size:.75rem;color:#6b7280;font-weight:600;white-space:nowrap;}
.chk-label{font-size:.75rem;color:#6b7280;display:flex;align-items:center;gap:5px;cursor:pointer;white-space:nowrap;}


/* ── TABS ── */
.tabs{background:#fff;border-bottom:2px solid #e5e7eb;padding:0 24px;display:flex;gap:0;}
.tab{padding:10px 20px;font-size:.82rem;font-weight:600;color:#6b7280;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:.12s;white-space:nowrap;}
.tab:hover{color:#374151;}
.tab.active{color:#0f172a;border-bottom-color:#0f172a;}
.tab-badge{display:inline-flex;align-items:center;justify-content:center;background:#f3f4f6;color:#6b7280;font-size:.65rem;font-weight:700;padding:1px 6px;border-radius:10px;margin-left:5px;}
.tab.active .tab-badge{background:#0f172a;color:#fff;}
.tab.surplus-tab.active{color:#7c3aed;border-bottom-color:#7c3aed;}
.tab.surplus-tab.active .tab-badge{background:#7c3aed;}

/* ── LIST ── */
.list{padding:14px 24px;display:flex;flex-direction:column;gap:4px;}

/* ── LEAD ROW ── */
.lrow{border-radius:10px;overflow:hidden;background:#fff;border:1px solid #d1d5db;transition:box-shadow .12s;}
.lrow:hover{box-shadow:0 3px 16px rgba(0,0,0,.13);}
.lrow.is-removed{opacity:.4;filter:grayscale(.5);}
.lrow.tier-urgent .lrow-head{background:#fff5f5;}
.lrow.tier-urgent{border-left:4px solid #dc2626 !important;border-color:#fca5a5;}
.lrow.tier-hot .lrow-head{background:#fff8f0;}
.lrow.tier-hot{border-left:4px solid #ea580c !important;}

.lrow-head{display:grid;grid-template-columns:3px 52px minmax(0,1fr) 100px 90px 110px 28px;align-items:center;cursor:pointer;min-height:48px;gap:0;user-select:none;}
.lrow-head:hover .lrow-name{color:#2563eb;}

.lbar{height:100%;min-height:48px;border-radius:10px 0 0 10px;}
.bar-urgent{background:#dc2626;}
.bar-hot{background:#ea580c;}
.bar-warm{background:#ca8a04;}
.bar-watch{background:#9ca3af;}
.bar-passed{background:#e5e7eb;}

.lscore{text-align:center;font-size:.82rem;font-weight:800;padding:0 6px;min-width:44px;}
.sc-urgent{color:#dc2626;font-size:.88rem;}
.sc-hot{color:#ea580c;font-size:.85rem;}
.sc-warm{color:#ca8a04;}
.sc-watch{color:#9ca3af;font-size:.78rem;}

.lname-wrap{padding:10px 12px 10px 8px;min-width:0;}
.lrow-name{font-weight:600;font-size:.87rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#111827;transition:color .12s;}
.lrow-prop{font-size:.72rem;color:#6b7280;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

.ltype{padding:0 10px;}
.tpill{font-size:.63rem;font-weight:700;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap;}
.tp-FORECLOSURE{background:#fee2e2;color:#b91c1c;}
.tp-PROBATE{background:#dbeafe;color:#1e40af;}
.tp-TAX\ DEED,.tp-TAX-DEED{background:#fef3c7;color:#92400e;}
.tp-NOA{background:#ede9fe;color:#5b21b6;}
.tp-MOBILE\ HOME,.tp-MOBILE-HOME{background:#dcfce7;color:#15803d;}
.tp-PUBLIC\ SALE{background:#fee2e2;color:#991b1b;}
.tp-WATCH{background:#f3f4f6;color:#6b7280;}
.tp-OTHER{background:#f3f4f6;color:#4b5563;}

.ldl{padding:0 10px;text-align:right;}
.dl-date{font-size:.78rem;font-weight:700;}
.dl-days{font-size:.68rem;margin-top:2px;font-weight:500;}
.cl-urgent{color:#dc2626;}
.cl-hot{color:#ea580c;}
.cl-ok{color:#16a34a;}
.cl-passed{color:#d1d5db;}
.cl-surplus{color:#7c3aed;font-weight:700;}
.lrow.tier-surplus .lrow-head{background:#faf5ff;}
.lrow.tier-surplus{border-left:4px solid #7c3aed !important;border-color:#ddd6fe;}
.surplus-badge{font-size:.65rem;font-weight:700;color:#7c3aed;background:#ede9fe;border:1px solid #ddd6fe;padding:2px 7px;border-radius:10px;white-space:nowrap;}

.lghl{padding:0 8px;}
.ghl-badge{font-size:.65rem;font-weight:700;padding:3px 8px;border-radius:5px;white-space:nowrap;cursor:pointer;border:none;display:block;width:100%;text-align:center;}
.g-ns{background:#f3f4f6;color:#6b7280;}
.g-sent{background:#dbeafe;color:#1d4ed8;}
.g-pip{background:#dcfce7;color:#15803d;}
.g-cont{background:#fef9c3;color:#854d0e;}
.g-closed{background:#e5e7eb;color:#374151;}
.g-dead{background:#fafafa;color:#d1d5db;}

.larrow{padding:0 8px;color:#d1d5db;font-size:.85rem;transition:transform .2s;text-align:center;}
.larrow.open{transform:rotate(90deg);}

/* ── DETAIL PANEL ── */
.lpanel{display:none;border-top:1px solid #e5e7eb;}
.lpanel.open{display:block;}
.lpanel-inner{padding:16px 20px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;background:#e8ecf4;}

/* ── PANEL CARD ── */
.pc{background:#f0f3f9;border:1px solid #dde3ef;border-radius:8px;padding:12px 14px;}
.pc-full{grid-column:1/-1;}
.pc-half{grid-column:span 2;}
.pc-title{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:#9ca3af;margin-bottom:10px;display:flex;align-items:center;gap:5px;}
.pc-title-icon{font-size:.9rem;}

/* info rows */
.ir{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:1px solid #f3f4f6;}
.ir:last-child{border-bottom:none;padding-bottom:0;}
.ir-lbl{font-size:.7rem;color:#9ca3af;font-weight:600;white-space:nowrap;flex-shrink:0;min-width:80px;}
.ir-val{font-size:.78rem;color:#111827;font-weight:500;text-align:right;word-break:break-word;}
.ir-val.urgent{color:#dc2626;font-weight:700;}
.ir-val.hot{color:#ea580c;font-weight:700;}
.ir-val a{color:#2563eb;}

/* heat signals */
.sig-list{display:flex;flex-direction:column;gap:6px;}
.sig-item{display:flex;align-items:flex-start;gap:8px;font-size:.76rem;color:#374151;line-height:1.45;}
.sig-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:5px;}
.sig-dot.d-red{background:#dc2626;}
.sig-dot.d-orange{background:#ea580c;}
.sig-dot.d-green{background:#16a34a;}

/* people */
.people-wrap{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.person-card{border-radius:6px;padding:10px 12px;border:1px solid #d1d5db;background:#fff;}
.person-card.dec{border-left:3px solid #dc2626;}
.person-card.pr{border-left:3px solid #16a34a;background:#ecfdf5;}
.pc-person-label{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
.pc-person-label.dec{color:#dc2626;}
.pc-person-label.pr{color:#16a34a;}
.pc-person-name{font-size:.82rem;font-weight:700;color:#111827;margin-bottom:2px;}
.pc-person-note{font-size:.68rem;color:#16a34a;font-weight:600;margin-bottom:8px;}
.pc-person-note.warn{color:#dc2626;}

/* inputs */
.fi-group{display:flex;flex-direction:column;gap:5px;}
.fi-row{display:flex;flex-direction:column;gap:2px;}
.fi-lbl{font-size:.62rem;color:#9ca3af;font-weight:600;text-transform:uppercase;letter-spacing:.3px;}
.fi{border:1px solid #c9d0de;border-radius:5px;padding:4px 8px;font-size:.78rem;color:#111827;background:#fff;width:100%;font-family:inherit;transition:.12s;}
.fi:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 2px rgba(59,130,246,.1);}
.pr .fi{border-color:#bbf7d0;}
.pr .fi:focus{border-color:#16a34a;box-shadow:0 0 0 2px rgba(22,163,74,.1);}
.fi-notes{resize:vertical;min-height:40px;}

/* actions bar */
.actions{display:flex;gap:7px;flex-wrap:wrap;align-items:center;}
.abtn{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:6px;font-size:.73rem;font-weight:600;border:1px solid transparent;cursor:pointer;text-decoration:none;transition:.12s;white-space:nowrap;}
.abtn:hover{filter:brightness(.93);}
.abtn-blue{background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe;}
.abtn-green{background:#f0fdf4;color:#15803d;border-color:#bbf7d0;}
.abtn-amber{background:#fffbeb;color:#92400e;border-color:#fde68a;}
.abtn-purple{background:#faf5ff;color:#6d28d9;border-color:#ddd6fe;}
.abtn-red{background:#fff1f2;color:#be123c;border-color:#fecdd3;}
.abtn-gray{background:#f3f4f6;color:#4b5563;border-color:#e5e7eb;}

/* ghl full */
.ghl-full-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.ghl-select{border:1px solid #e5e7eb;border-radius:6px;padding:5px 9px;font-size:.78rem;background:#fff;cursor:pointer;outline:none;min-width:150px;}
.ghl-select:focus{border-color:#3b82f6;}
.notes-ta{flex:1;min-width:160px;border:1px solid #e5e7eb;border-radius:6px;padding:5px 9px;font-size:.78rem;font-family:inherit;resize:none;height:34px;outline:none;background:#fff;}
.notes-ta:focus{border-color:#3b82f6;}
.save-flash{font-size:.7rem;color:#16a34a;font-weight:600;opacity:0;transition:opacity .3s;}
.save-flash.show{opacity:1;}

/* removed overlay */
.removed-bar{background:#fef2f2;border-top:1px solid #fecaca;padding:8px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.removed-bar span{font-size:.75rem;color:#991b1b;font-weight:600;}
.restore-btn{font-size:.72rem;color:#1d4ed8;cursor:pointer;text-decoration:underline;background:none;border:none;}

.empty{text-align:center;padding:60px 20px;color:#9ca3af;}
footer{text-align:center;padding:16px;font-size:.68rem;color:#d1d5db;}
</style>
</head>

function daysLeft(ds){ if(!ds) return null; const t=new Date(); t.setHours(0,0,0,0); return Math.round((new Date(ds+'T00:00:00')-t)/86400000); }
function fmtDate(ds){ if(!ds) return '—'; const [,m,d]=ds.split('-'); return ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+m]+' '+d; }
function dlInfo(ds, type){
  const d=daysLeft(ds);
  if(d===null) return {date:'—',days:'',cls:''};
  const date=fmtDate(ds);
  if(d<0){
    const isSale = type&&(type==='FORECLOSURE'||type==='TAX DEED'||type==='PUBLIC SALE'||type==='MOBILE HOME');
    return {date, days: isSale ? '⚡ Surplus?' : 'Passed', cls:'cl-passed', surplus: isSale};
  }
  if(d===0) return {date,days:'TODAY',cls:'cl-urgent'};
  if(d===1) return {date,days:'TOMORROW',cls:'cl-urgent'};
  return {date,days:`${d}d left`,cls:d<=5?'cl-urgent':d<=14?'cl-hot':'cl-ok'};
}
function tier(score,ds,type){
  const d=daysLeft(ds);
  if(d!==null&&d<0){
    const isSale=type&&(type==='FORECLOSURE'||type==='TAX DEED'||type==='PUBLIC SALE'||type==='MOBILE HOME');
    return isSale?'surplus':'passed';
  }
  if(d!==null&&d<=3&&score>0) return 'urgent';
  if(score>=85||(d!==null&&d<=10)) return 'hot';
  if(score>=60) return 'warm';
  return 'watch';
}
function scCls(t){ return {urgent:'sc-urgent',hot:'sc-hot',warm:'sc-warm',watch:'sc-watch',passed:'sc-watch'}[t]||'sc-watch'; }
function barCls(t){ return 'bar-'+t; }
function tpCls(type){ return 'tp-'+type.replace(/ /g,'-'); }
function gCls(v){ return {['Not Sent']:'g-ns',['Sent to GHL']:'g-sent',['In Pipeline']:'g-pip',['Contacted']:'g-cont',['Closed']:'g-closed',['Dead Lead']:'g-dead'}[v]||'g-ns'; }
function extractCityState(addr){
  if(!addr) return '';
  const m=addr.match(/,\s*([A-Za-z][A-Za-z\s]+?)\s+([A-Z]{2})\s+\d{5}/);
  if(m) return m[1].trim()+', '+m[2];
  const m2=addr.match(/([A-Za-z][A-Za-z\s]+?)\s+([A-Z]{2})\s+\d{5}/);
  return m2 ? m2[1].trim()+', '+m2[2] : '';
}
function tpsUrl(n){ return 'https://www.truepeoplesearch.com/results?name='+encodeURIComponent(n.replace(/^Estate of /i,'').replace(/ [—–].*/,'').replace(/ \/.*/,'').replace(/\s*\(.*/,'').trim()); }
function tpsUrlPR(first,last,addr){
  const name=(first+' '+last).trim(); if(!name) return null;
  const city=extractCityState(addr);
  return 'https://www.truepeoplesearch.com/results?name='+encodeURIComponent(name)+(city?'&citystatezip='+encodeURIComponent(city):'');
}
function paUrl(n){ const w=n.replace(/^Estate of /i,'').replace(/ [—–].*/,'').replace(/ \/.*/,'').replace(/\s*\(.*/,'').trim().split(' '); return `https://www.pascopa.com/Search/Owner?lastName=${encodeURIComponent(w[w.length-1]||'')}&firstName=${encodeURIComponent(w[0]||'')}`; }
function clerkUrl(cn){ if(!cn||cn.startsWith('Cert')) return 'https://pascoclerk.com/public-access/'; return `https://pascoclerk.com/public-access/?caseNum=${encodeURIComponent(cn)}`; }

      if(!hay.includes(srch)) return false;
    }
    return true;
  });

  leads.sort((a,b)=>{
    if(sort==='score') return b.score-a.score;
    if(sort==='deadline-desc'){
      const da=a.deadline?new Date(a.deadline):new Date('1900-01-01');
      const db=b.deadline?new Date(b.deadline):new Date('1900-01-01');
      return db-da||b.score-a.score;
    }
    const da=a.deadline?new Date(a.deadline):new Date('2099-01-01');
    const db=b.deadline?new Date(b.deadline):new Date('2099-01-01');
    return da-db||b.score-a.score;
  });

  // no alert bar — urgent leads highlighted red in rows

  // Split into active vs surplus
  const isSurplus = l => {
    const d=daysLeft(l.deadline);
    return d!==null && d<0 && (l.type==='FORECLOSURE'||l.type==='TAX DEED'||l.type==='PUBLIC SALE'||l.type==='MOBILE HOME');
  };
  const allActive = leads.filter(l=>!isSurplus(l));
  const allSurplus = leads.filter(isSurplus);

  document.getElementById('badge-active').textContent=allActive.length;
  document.getElementById('badge-surplus').textContent=allSurplus.length;

  leads = currentTab==='surplus' ? allSurplus : allActive;
  document.getElementById('tbcount').textContent=`${leads.length} ${currentTab==='surplus'?'surplus':'active'} leads`;

  const list=document.getElementById('list');
  list.innerHTML=leads.length ? leads.map(l=>buildRow(l)).join('') : '<div class="empty">No leads match your filters.</div>';
  if(openId){
    const p=document.getElementById('p-'+openId);
    const h=document.getElementById('h-'+openId);
    if(p){p.classList.add('open'); if(h){h.querySelector('.larrow').classList.add('open');h.parentElement.classList.add('is-open');}}
  }
}

function buildRow(l){
  const t=tier(l.score,l.deadline,l.type);
  const dl=dlInfo(l.deadline, l.type);
  const s=ls(l.id);
  const isProbate=l.type==='PROBATE';
  const prFirst=s.prFirst||l.cf||'';
  const prLast=s.prLast||l.cl||'';
  const prAddrVal=s.prAddr||(isProbate?l.addr:'');
  const pdfLink=s.pdf||PDF[l.edition]||'';
  const isRemoved=s.removed;
  const hasCase=l.caseNum&&!l.caseNum.startsWith('Cert')&&!l.caseNum.startsWith('Multiple')&&!l.caseNum.startsWith('Parcel');

  return `<div class="lrow${isRemoved?' is-removed':''} tier-${t}" id="row-${l.id}">
<div class="lrow-head" id="h-${l.id}" onclick="toggle('${l.id}')">
  <div class="lbar ${barCls(t)}"></div>
  <div class="lscore ${scCls(t)}">${l.score||'—'}</div>
  <div class="lname-wrap">
    <div class="lrow-name">${l.name}</div>
    <div class="lrow-prop">${l.property||l.addr}</div>
  </div>
  <div class="ltype"><span class="tpill ${tpCls(l.type)}">${l.type}</span></div>
  <div class="ldl">
    <div class="dl-date ${dl.cls}">${dl.date}</div>
    <div class="dl-days ${dl.surplus?'cl-surplus':dl.cls}">${dl.days}${dl.surplus?' <span class=\"surplus-badge\">surplus</span>':''}</div>
  </div>
  <div class="lghl">
    <select class="ghl-badge ${gCls(s.ghl)}" onclick="event.stopPropagation()" onchange="quickGHL('${l.id}',this)">
      ${['Not Sent','Sent to GHL','In Pipeline','Contacted','Closed','Dead Lead'].map(o=>`<option ${s.ghl===o?'selected':''}>${o}</option>`).join('')}
    </select>
  </div>
  <div class="larrow">▶</div>
</div>

<div class="lpanel" id="p-${l.id}">
  <div class="lpanel-inner">

    ${t==='surplus'?`<div class="pc pc-full" style="background:#faf5ff;border-color:#ddd6fe;margin-bottom:0;">
      <div class="pc-title"><span class="pc-title-icon">⚡</span> Surplus Outreach</div>
      <div style="font-size:.79rem;color:#5b21b6;line-height:1.6;">Auction date passed. If the property sold for more than the debt, the <b>former owner has unclaimed surplus funds</b> at the courthouse. Contact them — they likely don't know. Help them file the claim. Warm lead.</div>
    </div>`:''}
    <!-- Notice Details -->
    <div class="pc">
      <div class="pc-title"><span class="pc-title-icon">📋</span> Notice Details</div>
      <div class="ir"><span class="ir-lbl">Type</span><span class="ir-val">${l.type}</span></div>
      <div class="ir"><span class="ir-lbl">County</span><span class="ir-val">${l.county}</span></div>
      <div class="ir"><span class="ir-lbl">Edition</span><span class="ir-val">${l.edition}</span></div>
      <div class="ir"><span class="ir-lbl">Property</span><span class="ir-val">${l.property||l.addr}</span></div>
      ${l.caseNum?`<div class="ir"><span class="ir-lbl">Case #</span><span class="ir-val">${l.caseNum}</span></div>`:''}
      <div class="ir"><span class="ir-lbl">Deadline</span><span class="ir-val ${dl.cls}">${dl.date}${dl.days?' — '+dl.days:''}</span></div>
      ${l.plaintiff?`<div class="ir"><span class="ir-lbl">Plaintiff</span><span class="ir-val">${l.plaintiff}</span></div>`:''}
    </div>

    <!-- Attorney & Contact -->
    <div class="pc">
      <div class="pc-title"><span class="pc-title-icon">⚖️</span> Attorney & Contact</div>
      ${l.attyName?`<div class="ir"><span class="ir-lbl">Attorney</span><span class="ir-val">${l.attyName}</span></div>`:'<div class="ir"><span class="ir-lbl">Attorney</span><span class="ir-val" style="color:#9ca3af;">Not listed</span></div>'}
      ${l.attyPhone?`<div class="ir"><span class="ir-lbl">Phone</span><span class="ir-val"><a href="tel:${l.attyPhone}">${l.attyPhone}</a></span></div>`:''}
      ${l.attyEmail?`<div class="ir"><span class="ir-lbl">Email</span><span class="ir-val"><a href="mailto:${l.attyEmail}">${l.attyEmail}</a></span></div>`:`<div class="ir"><span class="ir-lbl">Email</span><span class="ir-val" style="color:#9ca3af;">Not listed</span></div>`}
      ${l.plaintiff?`<div class="ir"><span class="ir-lbl">Lender</span><span class="ir-val">${l.plaintiff}</span></div>`:''}
      ${l.addr!==l.property?`<div class="ir"><span class="ir-lbl">Full Address</span><span class="ir-val">${l.addr}</span></div>`:''}
    </div>

    <!-- Heat Signals -->
    <div class="pc">
      <div class="pc-title"><span class="pc-title-icon">🔥</span> Heat Signals</div>
      <div class="sig-list">
        ${l.signals.map((s,i)=>`<div class="sig-item"><div class="sig-dot ${i===0?'d-red':i===1?'d-orange':'d-green'}"></div><span>${s}</span></div>`).join('')}
      </div>
    </div>

    <!-- People — full width -->
    <div class="pc pc-full">
      <div class="pc-title"><span class="pc-title-icon">👤</span> People</div>
      <div class="people-wrap">

        <div class="person-card dec">
          <div class="pc-person-label dec">${isProbate?'⚰️ Deceased — DO NOT CONTACT':'🏠 Owner / Defendant'}</div>
          <div class="pc-person-name">${l.deceased||l.name.replace(/ [—–].*/,'').replace(/^Estate of /i,'')}</div>
          ${isProbate?'<div class="pc-person-note warn">Contact the Personal Representative instead</div>':''}
        </div>

        <div class="person-card pr">
          <div class="pc-person-label pr">${isProbate?'✅ Personal Representative — WHO TO CONTACT':'📞 Point of Contact'}</div>
          <div class="pc-person-name">${prFirst||prLast ? `${prFirst} ${prLast}`.trim() : '<span style="color:#9ca3af;font-style:italic;font-size:.78rem;">Run TruePeopleSearch to find</span>'}</div>
          ${isProbate?'<div class="pc-person-note">→ Send this person to GHL</div>':''}
          ${isProbate&&l.addr?`<div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:5px;padding:6px 10px;margin-bottom:8px;font-size:.72rem;color:#1e40af;line-height:1.5;"><span style="font-weight:700;text-transform:uppercase;letter-spacing:.4px;font-size:.62rem;display:block;margin-bottom:2px;">📍 Address from Notice</span>${l.addr}</div>`:''}
          <div class="fi-group" style="margin-top:8px;">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;">
              <div class="fi-row"><label class="fi-lbl">First Name</label><input class="fi" value="${prFirst}" onchange="set('${l.id}','prFirst',this.value)" placeholder="First"></div>
              <div class="fi-row"><label class="fi-lbl">Last Name</label><input class="fi" value="${prLast}" onchange="set('${l.id}','prLast',this.value)" placeholder="Last"></div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;">
              <div class="fi-row"><label class="fi-lbl">Phone</label><input class="fi" value="${s.prPhone}" onchange="set('${l.id}','prPhone',this.value)" placeholder="(000) 000-0000"></div>
              <div class="fi-row"><label class="fi-lbl">Email</label><input class="fi" value="${s.prEmail}" onchange="set('${l.id}','prEmail',this.value)" placeholder="email@example.com"></div>
            </div>
            <div class="fi-row"><label class="fi-lbl">Mailing Address</label><input class="fi" value="${prAddrVal}" onchange="set('${l.id}','prAddr',this.value)" placeholder="City, State ZIP"></div>
          </div>
        </div>

      </div>
      <div class="fi-row"><label class="fi-lbl">VA Notes</label><textarea class="fi fi-notes" onchange="set('${l.id}','prNotes',this.value)" placeholder="Follow-up notes, observations, next steps...">${s.prNotes}</textarea></div>
    </div>

    <!-- Quick Actions -->
    <div class="pc pc-full">
      <div class="pc-title"><span class="pc-title-icon">⚡</span> Quick Actions</div>
      <div class="actions">
        ${isProbate&&(prFirst||prLast)
          ? `<a class="abtn abtn-blue" href="${tpsUrlPR(prFirst,prLast,l.addr)}" target="_blank">🔍 Search PR${extractCityState(l.addr)?' ('+extractCityState(l.addr)+')':''}</a>`
          : `<a class="abtn abtn-blue" href="${tpsUrl(l.name)}" target="_blank">🔍 TruePeopleSearch</a>`}
        ${isProbate&&!(prFirst||prLast)?`<a class="abtn abtn-blue" style="opacity:.65;" href="${tpsUrl(l.name)}" target="_blank">🔍 TPS (fill PR name first)</a>`:''}
        <a class="abtn abtn-green" href="${paUrl(l.name)}" target="_blank">🏠 ${isProbate?'Search by Deceased':'Pasco PA'}</a>
        <a class="abtn abtn-purple" href="${clerkUrl(l.caseNum)}" target="_blank">⚖️ Clerk of Court${hasCase?' (Case #)':''}</a>
        ${pdfLink?`<a class="abtn abtn-amber" href="${pdfLink}" target="_blank">📄 View PDF — ${l.edition}</a>`:`<span class="abtn abtn-amber" style="opacity:.5;cursor:pointer;" onclick="addPdf('${l.id}')">📄 Add PDF Link</span>`}
        ${isRemoved
          ? `<button class="abtn abtn-gray" onclick="removeLead('${l.id}',false)">↩ Restore Lead</button>`
          : `<button class="abtn abtn-red" onclick="removeLead('${l.id}',true)">✕ Remove Lead</button>`}
      </div>
    </div>

    <!-- GHL Pipeline -->
    <div class="pc pc-full">
      <div class="pc-title"><span class="pc-title-icon">📤</span> GHL Pipeline</div>
      <div class="ghl-full-row">
        <select class="ghl-select" onchange="fullGHL('${l.id}',this)">
          ${['Not Sent','Sent to GHL','In Pipeline','Contacted','Closed','Dead Lead'].map(o=>`<option ${s.ghl===o?'selected':''}>${o}</option>`).join('')}
        </select>
        <textarea class="notes-ta" placeholder="Pipeline notes…" onchange="set('${l.id}','notes',this.value)">${s.notes}</textarea>
        <span class="save-flash" id="sf-${l.id}">✓ Saved</span>
      </div>
    </div>

  </div>
  ${isRemoved?`<div class="removed-bar"><span>This lead has been removed from the active board.</span><button class="restore-btn" onclick="removeLead('${l.id}',false)">Restore</button></div>`:''}
</div>
</div>`;
}

function toggle(id){
  const panel=document.getElementById('p-'+id);
  const head=document.getElementById('h-'+id);
  const arrow=head.querySelector('.larrow');
  if(openId&&openId!==id){
    const op=document.getElementById('p-'+openId);
    const oh=document.getElementById('h-'+openId);
    if(op){op.classList.remove('open');oh.querySelector('.larrow').classList.remove('open');}
  }
  const isOpen=panel.classList.contains('open');
  panel.classList.toggle('open',!isOpen);
  arrow.classList.toggle('open',!isOpen);
  openId=isOpen?null:id;
}

function quickGHL(id,sel){
  const val=sel.value;
  set(id,'ghl',val);
  sel.className='ghl-badge '+gCls(val);
  const full=document.querySelector(`#p-${id} .ghl-select`);
  if(full) full.value=val;
}
function fullGHL(id,sel){
  const val=sel.value;
  set(id,'ghl',val);
  const pill=document.querySelector(`#h-${id} .ghl-badge`);
  if(pill){pill.className='ghl-badge '+gCls(val);pill.value=val;}
}
function removeLead(id,remove){
  set(id,'removed',remove);
  render();
}
function addPdf(id){
  const url=prompt('Paste PDF link (Google Drive, CloudFront, etc.):');
  if(url&&url.startsWith('http')){ set(id,'pdf',url); render(); }
}
function exportData(){
  const b=new Blob([JSON.stringify(STATE,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(b);
  a.download='radar_pasco_'+new Date().toISOString().slice(0,10)+'.json'; a.click();
}
function importData(){
  const i=document.createElement('input'); i.type='file'; i.accept='.json';
  i.onchange=e=>{
    const r=new FileReader();
    r.onload=ev=>{try{STATE=JSON.parse(ev.target.result);localStorage.setItem(STORE,JSON.stringify(STATE));render();alert('Data imported!');}catch{alert('Invalid file.');}};
    r.readAsText(e.target.files[0]);
  };
  i.click();
}

render();
</script>
</body>
