<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RADAR — Pasco County Lead Board</title>
<style>
:root { color-scheme: light; --urgent:#c0392b; --hot:#e67e22; --warm:#d4ac0d; --watch:#95a5a6; }
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f8;color:#1a1a2e;font-size:13px;}

/* HEADER */
.hdr{background:linear-gradient(135deg,#1a1a2e,#2c3e6b);color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.hdr h1{font-size:1.1rem;font-weight:800;}
.hdr .sub{font-size:.72rem;color:#aac4ff;margin-top:2px;}
.hdr-btns{display:flex;gap:6px;}
.hbtn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:4px 10px;border-radius:5px;font-size:.72rem;cursor:pointer;font-weight:600;}
.hbtn:hover{background:rgba(255,255,255,.25);}

/* ALERT */
#alert-bar{background:#c0392b;color:#fff;padding:7px 20px;font-size:.8rem;font-weight:700;display:none;gap:8px;flex-wrap:wrap;border-bottom:3px solid #922b21;}

/* CONTROLS */
.ctrl{background:#fff;border-bottom:1px solid #dde;padding:10px 20px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;position:sticky;top:0;z-index:200;box-shadow:0 1px 4px rgba(0,0,0,.08);}
.ctrl input,.ctrl select{border:1px solid #ccc;border-radius:5px;padding:5px 9px;font-size:.8rem;background:#fff;}
.ctrl input{width:200px;}
.cbadge{margin-left:auto;font-size:.75rem;color:#666;font-weight:700;background:#f0f2f8;padding:3px 9px;border-radius:10px;}

/* TABLE */
.tbl{padding:12px 20px;display:flex;flex-direction:column;gap:0;}

/* ROW */
.row-wrap{margin-bottom:4px;border-radius:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.07);}
.row{display:grid;grid-template-columns:4px 48px 1fr auto auto 90px 22px;align-items:center;background:#fff;cursor:pointer;border:1px solid #e4e6ef;border-radius:8px;transition:box-shadow .12s;user-select:none;gap:0;}
.row:hover{box-shadow:0 2px 10px rgba(0,0,0,.1);}
.row.open{border-radius:8px 8px 0 0;border-bottom-color:transparent;}

/* row cells */
.row-bar{width:4px;height:100%;min-height:46px;border-radius:8px 0 0 8px;}
.bar-urgent{background:var(--urgent);}
.bar-hot{background:var(--hot);}
.bar-warm{background:var(--warm);}
.bar-watch{background:var(--watch);}
.bar-passed{background:#ddd;}

.row-score{padding:0 8px;text-align:center;font-size:.8rem;font-weight:800;width:48px;}
.sc-urgent{color:var(--urgent);}
.sc-hot{color:var(--hot);}
.sc-warm{color:var(--warm);}
.sc-watch{color:#aaa;}

.row-main{padding:10px 8px 10px 4px;min-width:0;}
.row-name{font-weight:700;font-size:.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.row-sub{font-size:.72rem;color:#777;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

.row-type{padding:0 8px;white-space:nowrap;}
.type-pill{font-size:.65rem;font-weight:700;padding:2px 7px;border-radius:8px;text-transform:uppercase;letter-spacing:.3px;}
.tFORECLOSURE{background:#fde8e8;color:#c0392b;}
.tPROBATE{background:#d6eaf8;color:#1a5276;}
.tTAX-DEED{background:#fef9e7;color:#9a7d0a;}
.tNOA{background:#f0e6fd;color:#6c3483;}
.tMOBILE-HOME{background:#d5f5e3;color:#1e8449;}
.tPUBLIC-SALE{background:#fde8e8;color:#922b21;}
.tWATCH{background:#eee;color:#888;}
.tOTHER{background:#eee;color:#666;}

.row-dl{padding:0 8px;text-align:right;white-space:nowrap;min-width:90px;}
.dl-label{font-size:.78rem;font-weight:700;}
.dl-days{font-size:.68rem;margin-top:1px;}
.dl-urgent{color:var(--urgent);}
.dl-hot{color:var(--hot);}
.dl-ok{color:#1e8449;}
.dl-passed{color:#bbb;}

.row-ghl{min-width:90px;padding:0 6px;}
.ghl-pill{font-size:.68rem;font-weight:700;padding:3px 7px;border-radius:6px;text-align:center;cursor:pointer;display:block;white-space:nowrap;}
.gns{background:#f5f5f5;color:#888;border:1px solid #ddd;}
.gsent{background:#eaf2ff;color:#2471a3;border:1px solid #aed6f1;}
.gpip{background:#eafaf1;color:#1e8449;border:1px solid #a9dfbf;}
.gcont{background:#fef9e7;color:#9a7d0a;border:1px solid #f9e79f;}
.gclosed{background:#f0f0f0;color:#555;border:1px solid #ccc;}
.gdead{background:#fafafa;color:#bbb;border:1px solid #eee;}

.row-arrow{padding:0 8px;color:#bbb;font-size:.9rem;transition:transform .2s;}
.row-arrow.open{transform:rotate(90deg);}

/* DETAIL PANEL */
.detail{background:#f8f9fd;border:1px solid #e4e6ef;border-top:none;border-radius:0 0 8px 8px;display:none;}
.detail.open{display:block;}
.detail-inner{padding:14px 16px;display:grid;grid-template-columns:1fr 1fr;gap:14px;}

/* sections inside detail */
.dsec{background:#fff;border-radius:7px;border:1px solid #eaecf5;padding:12px 14px;}
.dsec-title{font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:#888;margin-bottom:10px;display:flex;align-items:center;gap:5px;}
.dsec-title span{font-size:.8rem;}
.drow{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;padding:4px 0;border-bottom:1px solid #f5f5f8;}
.drow:last-child{border-bottom:none;}
.dlbl{font-size:.72rem;color:#888;font-weight:600;white-space:nowrap;min-width:90px;}
.dval{font-size:.78rem;color:#1a1a2e;font-weight:500;text-align:right;word-break:break-word;}
.dval a{color:#2471a3;text-decoration:none;}
.dval a:hover{text-decoration:underline;}
.dval.urgent{color:var(--urgent);font-weight:700;}
.dval.hot{color:var(--hot);font-weight:700;}

/* heat signals */
.signals{display:flex;flex-direction:column;gap:5px;margin-top:2px;}
.signal{display:flex;align-items:flex-start;gap:6px;font-size:.76rem;color:#444;line-height:1.4;}
.sig-dot{width:6px;height:6px;border-radius:50%;background:#e67e22;flex-shrink:0;margin-top:4px;}
.sig-dot.red{background:var(--urgent);}
.sig-dot.green{background:#1e8449;}

/* people section - full width */
.dsec.people{grid-column:1/-1;}
.people-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.person-box{background:#f8f9fd;border-radius:6px;padding:10px 12px;border:1px solid #eaecf5;}
.person-box.pr-box{background:#eafaf1;border-color:#a9dfbf;}
.person-label{font-size:.65rem;font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.deceased-label{color:#c0392b;}
.pr-label{color:#1e8449;}
.person-name{font-size:.85rem;font-weight:700;color:#1a1a2e;margin-bottom:6px;}
.pr-note{font-size:.68rem;color:#1e8449;font-weight:700;margin-bottom:8px;}
.field-group{display:flex;flex-direction:column;gap:4px;}
.field-row{display:flex;flex-direction:column;gap:2px;}
.field-label{font-size:.65rem;color:#888;font-weight:600;text-transform:uppercase;}
.field-input{border:1px solid #dde;border-radius:4px;padding:4px 7px;font-size:.78rem;background:#fff;width:100%;font-family:inherit;}
.field-input:focus{outline:none;border-color:#2471a3;box-shadow:0 0 0 2px rgba(36,113,163,.12);}
.pr-box .field-input{border-color:#a9dfbf;}
.pr-box .field-input:focus{border-color:#1e8449;box-shadow:0 0 0 2px rgba(30,132,73,.12);}

/* links section */
.dsec.links{grid-column:1/-1;}
.links-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.lbtn{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:6px;font-size:.76rem;font-weight:700;text-decoration:none;cursor:pointer;border:1px solid transparent;}
.lbtn-tps{background:#eaf2ff;color:#2471a3;border-color:#aed6f1;}
.lbtn-pa{background:#eafaf1;color:#1e8449;border-color:#a9dfbf;}
.lbtn-pdf{background:#fef9e7;color:#9a7d0a;border-color:#f9e79f;}
.lbtn-pdf.no-pdf{background:#f8f8f8;color:#aaa;border-color:#ddd;cursor:pointer;}
.lbtn:hover{filter:brightness(.93);}

/* GHL full */
.dsec.ghl-sec{grid-column:1/-1;}
.ghl-full{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.ghl-select-full{border:1px solid #ccc;border-radius:6px;padding:5px 10px;font-size:.8rem;background:#fff;font-weight:600;cursor:pointer;min-width:160px;}
.notes-area{flex:1;min-width:180px;border:1px solid #dde;border-radius:5px;padding:5px 8px;font-size:.78rem;font-family:inherit;resize:none;height:38px;}
.notes-area:focus{outline:none;border-color:#2471a3;}
.save-btn{background:#1a1a2e;color:#fff;border:none;border-radius:5px;padding:5px 12px;font-size:.76rem;font-weight:700;cursor:pointer;}
.save-btn:hover{background:#2c3e6b;}
.saved-msg{font-size:.72rem;color:#1e8449;font-weight:700;opacity:0;transition:opacity .3s;}
.saved-msg.show{opacity:1;}

.empty-state{text-align:center;padding:60px;color:#aaa;}

footer{text-align:center;padding:16px;font-size:.7rem;color:#bbb;}
</style>
</head>

const STORE = 'radar_v3';
let STATE = (() => { try { return JSON.parse(localStorage.getItem(STORE))||{}; } catch { return {}; } })();
function ls(id){ return STATE[id]||{decFirst:'',decLast:'',prFirst:'',prLast:'',prPhone:'',prEmail:'',prAddr:'',prNotes:'',ghl:'Not Sent',notes:'',pdf:''}; }
function ss(id,k,v){ if(!STATE[id]) STATE[id]=ls(id); STATE[id][k]=v; localStorage.setItem(STORE,JSON.stringify(STATE)); }
function flash(){ const el=document.getElementById('autosave'); el.textContent='✓ Saved'; setTimeout(()=>el.textContent='',1800); }

function days(ds){ if(!ds) return null; return Math.round((new Date(ds+'T00:00:00')-TODAY)/86400000); }
function dlText(ds){ if(!ds) return {txt:'—',cls:''}; const d=days(ds); const [,m,day]=ds.split('-'); const mo=['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+m]; const base=`${mo} ${+day}`; if(d<0) return {txt:`${base}`,cls:'dl-passed'}; if(d===0) return {txt:`${base} — TODAY`,cls:'dl-urgent'}; if(d===1) return {txt:`${base} — TOMORROW`,cls:'dl-urgent'}; return {txt:`${base}`,cls:d<=5?'dl-urgent':d<=14?'dl-hot':'dl-ok',days:`${d}d left`}; }
function tier(score,ds){ const d=days(ds); if(d!==null&&d<0) return 'passed'; if(d!==null&&d<=3&&score>0) return 'urgent'; if(score>=85||(d!==null&&d<=10)) return 'hot'; if(score>=60) return 'warm'; return 'watch'; }
function typeCls(t){ const m={'FORECLOSURE':'tFORECLOSURE','PROBATE':'tPROBATE','TAX DEED':'tTAX-DEED','NOA':'tNOA','MOBILE HOME':'tMOBILE-HOME','PUBLIC SALE':'tPUBLIC-SALE','WATCH':'tWATCH'}; return m[t]||'tOTHER'; }
function scCls(t){ return {urgent:'sc-urgent',hot:'sc-hot',warm:'sc-warm',watch:'sc-watch',passed:'sc-watch'}[t]; }
function ghlCls(v){ return {['Not Sent']:'gns',['Sent to GHL']:'gsent',['In Pipeline']:'gpip',['Contacted']:'gcont',['Closed']:'gclosed',['Dead Lead']:'gdead'}[v]||'gns'; }
function tpsUrl(name){ const c=name.replace(/^Estate of /i,'').replace(/ — .*/,'').replace(/ \/.*/,'').replace(/\s*\(.*/,'').trim(); return 'https://www.truepeoplesearch.com/results?name='+encodeURIComponent(c); }
function paUrl(name){ const c=name.replace(/^Estate of /i,'').replace(/ — .*/,'').replace(/ \/.*/,'').replace(/\s*\(.*/,'').trim(); const p=c.split(' '); return `https://www.pascopa.com/Search/Owner?lastName=${encodeURIComponent(p[p.length-1]||'')}&firstName=${encodeURIComponent(p[0]||'')}`; }

let openId = null;

function render(){
  const srch=document.getElementById('search').value.toLowerCase();
  const ft=document.getElementById('ft').value;
  const fe=document.getElementById('fe').value;
  const fg=document.getElementById('fg').value;
  const sort=document.getElementById('sort').value;
  const hp=document.getElementById('hp').checked;

  let leads=LEADS.filter(l=>{
    if(ft&&l.type!==ft) return false;
    if(fe&&l.edition!==fe) return false;
    if(hp&&l.deadline&&days(l.deadline)<0) return false;
    if(fg&&ls(l.id).ghl!==fg) return false;
    if(srch){ const h=[l.name,l.addr,l.type,l.attyName,l.plaintiff,l.edition,l.property,l.caseNum].join(' ').toLowerCase(); if(!h.includes(srch)) return false; }
    return true;
  });

  leads.sort((a,b)=>{
    if(sort==='score') return b.score-a.score;
    const da=a.deadline?new Date(a.deadline):new Date('2099-01-01');
    const db=b.deadline?new Date(b.deadline):new Date('2099-01-01');
    return da-db||b.score-a.score;
  });

  // alert bar
  const urg=LEADS.filter(l=>{const d=days(l.deadline);return d!==null&&d>=0&&d<=3&&l.score>0;});
  const ab=document.getElementById('alert-bar');
  if(urg.length){ab.style.display='flex';ab.innerHTML='⚠️ &nbsp;'+urg.map(l=>`<b>${l.name}</b> — ${dlText(l.deadline).txt} (${days(l.deadline)===0?'TODAY':days(l.deadline)===1?'TOMORROW':days(l.deadline)+'d'}`).join('&nbsp;·&nbsp;');}
  else ab.style.display='none';

  document.getElementById('cbadge').textContent=`${leads.length} of ${LEADS.length} leads`;
  const tbl=document.getElementById('tbl');
  tbl.innerHTML=leads.map(l=>buildRow(l)).join('');

  // restore open row
  if(openId) { const el=document.getElementById('d-'+openId); if(el){el.classList.add('open');const r=document.getElementById('r-'+openId);if(r){r.classList.add('open');r.querySelector('.row-arrow').classList.add('open');}}}
}

function buildRow(l){
  const t=tier(l.score,l.deadline);
  const dl=dlText(l.deadline);
  const s=ls(l.id);
  const isProbate=l.type==='PROBATE';
  const pdfLink=s.pdf||(l.edition==='May 29'?PDF_MAY29:PDF_MAY15)||'';

  return `<div class="row-wrap" id="rw-${l.id}">
<div class="row" id="r-${l.id}" onclick="toggle('${l.id}')">
  <div class="row-bar bar-${t}"></div>
  <div class="row-score ${scCls(t)}">${l.score||'—'}</div>
  <div class="row-main">
    <div class="row-name">${l.name}</div>
    <div class="row-sub">${l.property||l.addr}</div>
  </div>
  <div class="row-type"><span class="type-pill ${typeCls(l.type)}">${l.type}</span></div>
  <div class="row-dl">
    <div class="dl-label ${dl.cls}">${dl.txt}</div>
    ${dl.days?`<div class="dl-days ${dl.cls}">${dl.days}</div>`:''}
  </div>
  <div class="row-ghl">
    <select class="ghl-pill ${ghlCls(s.ghl)}" onclick="event.stopPropagation()" onchange="updateGHL('${l.id}',this)">
      ${['Not Sent','Sent to GHL','In Pipeline','Contacted','Closed','Dead Lead'].map(o=>`<option ${s.ghl===o?'selected':''}>${o}</option>`).join('')}
    </select>
  </div>
  <div class="row-arrow">▶</div>
</div>

<div class="detail" id="d-${l.id}">

    <!-- Notice Details -->
    <div class="dsec">
      <div class="dsec-title"><span>📋</span> Notice Details</div>
      <div class="drow"><span class="dlbl">Type</span><span class="dval">${l.type}</span></div>
      <div class="drow"><span class="dlbl">County</span><span class="dval">${l.county}</span></div>
      <div class="drow"><span class="dlbl">Property</span><span class="dval">${l.property||l.addr}</span></div>
      ${l.caseNum?`<div class="drow"><span class="dlbl">Case #</span><span class="dval">${l.caseNum}</span></div>`:''}
      <div class="drow"><span class="dlbl">Deadline</span><span class="dval ${dl.cls}">${dl.txt}${dl.days?' — '+dl.days:''}</span></div>

      </div>
    </div>

    <!-- People — full width -->
    <div class="dsec people">
      <div class="dsec-title"><span>👤</span> People</div>
      <div class="people-grid">

        <!-- Deceased / Owner -->
        <div class="person-box">
          <div class="person-label deceased-label">${isProbate?'⚰️ Deceased Owner (DO NOT CONTACT)':'🏠 Property Owner / Defendant'}</div>
          <div class="person-name">${l.deceased||l.name.replace(/ — .*/,'').replace(/^Estate of /i,'')}</div>
          ${isProbate?'<div style="font-size:.7rem;color:#c0392b;margin-bottom:6px;">This person is deceased — contact the PR below</div>':''}
          <div class="field-group">
            <div class="field-row"><label class="field-label">First Name</label><input class="field-input" value="${s.decFirst}" onchange="ss('${l.id}','decFirst',this.value);flash()" placeholder="First"></div>
            <div class="field-row"><label class="field-label">Last Name</label><input class="field-input" value="${s.decLast}" onchange="ss('${l.id}','decLast',this.value);flash()" placeholder="Last"></div>
          </div>
        </div>

        <!-- Personal Representative / Contact -->
        <div class="person-box pr-box">
          <div class="person-label pr-label">${isProbate?'✅ Personal Representative (WHO TO CONTACT)':'📞 Point of Contact'}</div>
          <div class="person-name">${isProbate?'Find via TruePeopleSearch or attorney':'Call/contact directly'}</div>
          ${isProbate?'<div class="pr-note">→ This person goes to GHL</div>':''}
          <div class="field-group">
            <div class="field-row"><label class="field-label">First Name</label><input class="field-input" value="${s.prFirst}" onchange="ss('${l.id}','prFirst',this.value);flash()" placeholder="First"></div>
            <div class="field-row"><label class="field-label">Last Name</label><input class="field-input" value="${s.prLast}" onchange="ss('${l.id}','prLast',this.value);flash()" placeholder="Last"></div>
            <div class="field-row"><label class="field-label">Phone</label><input class="field-input" value="${s.prPhone}" onchange="ss('${l.id}','prPhone',this.value);flash()" placeholder="(000) 000-0000"></div>
            <div class="field-row"><label class="field-label">Email</label><input class="field-input" value="${s.prEmail}" onchange="ss('${l.id}','prEmail',this.value);flash()" placeholder="email@example.com"></div>
            <div class="field-row"><label class="field-label">Mailing Address</label><input class="field-input" value="${s.prAddr}" onchange="ss('${l.id}','prAddr',this.value);flash()" placeholder="City, State ZIP"></div>
          </div>
        </div>

      </div>
      <!-- Notes -->
      <div style="margin-top:8px;">
        <label class="field-label" style="display:block;margin-bottom:4px;">VA Notes</label>
        <textarea class="field-input" rows="2" style="resize:vertical;" onchange="ss('${l.id}','prNotes',this.value);flash()" placeholder="Notes, follow-up actions, observations...">${s.prNotes}</textarea>
      </div>
    </div>

    <!-- Quick Links -->
    <div class="dsec links">
      <div class="dsec-title"><span>🔗</span> Quick Links</div>
      <div class="links-row">
        <a class="lbtn lbtn-tps" href="${tpsUrl(l.name)}" target="_blank">🔍 TruePeopleSearch</a>
        <a class="lbtn lbtn-pa" href="${paUrl(l.name)}" target="_blank">🏠 Pasco PA</a>
        ${pdfLink
          ? `<a class="lbtn lbtn-pdf" href="${pdfLink}" target="_blank">📄 View PDF (${l.edition})</a>`
          : `<span class="lbtn lbtn-pdf no-pdf" onclick="addPdf('${l.id}')">📄 Add PDF Link</span>`}
      </div>
    </div>

    <!-- GHL -->
    <div class="dsec ghl-sec">
      <div class="dsec-title"><span>📤</span> GHL Pipeline</div>
      <div class="ghl-full">
        <select class="ghl-select-full" onchange="updateGHL('${l.id}',this)">
          ${['Not Sent','Sent to GHL','In Pipeline','Contacted','Closed','Dead Lead'].map(o=>`<option ${s.ghl===o?'selected':''}>${o}</option>`).join('')}
        </select>
        <textarea class="notes-area" placeholder="Pipeline notes..." onchange="ss('${l.id}','notes',this.value);flash()">${s.notes}</textarea>
        <span class="saved-msg" id="saved-${l.id}">✓ Saved</span>
      </div>
    </div>

  </div>
</div>
</div>`;
}

function toggle(id){
  const detail=document.getElementById('d-'+id);
  const row=document.getElementById('r-'+id);
  const arrow=row.querySelector('.row-arrow');
  if(openId&&openId!==id){
    const od=document.getElementById('d-'+openId);
    const or=document.getElementById('r-'+openId);
    if(od) od.classList.remove('open');
    if(or){or.classList.remove('open');or.querySelector('.row-arrow').classList.remove('open');}
  }
  const isOpen=detail.classList.contains('open');
  detail.classList.toggle('open',!isOpen);
  row.classList.toggle('open',!isOpen);
  arrow.classList.toggle('open',!isOpen);
  openId=isOpen?null:id;
}

function updateGHL(id,sel){
  const val=sel.value;
  ss(id,'ghl',val); flash();
  // update both selects for this lead
  document.querySelectorAll(`[onchange*="updateGHL('${id}"]`).forEach(s=>{s.value=val;});
  // update row pill class
  const pill=document.querySelector(`#r-${id} .ghl-pill`);
  if(pill) pill.className='ghl-pill '+ghlCls(val);
  const full=document.querySelector(`#d-${id} .ghl-select-full`);
  if(full) full.value=val;
}

function addPdf(id){
  const url=prompt('Paste the PDF link (Google Drive, CloudFront, etc.):');
  if(url&&url.startsWith('http')){ ss(id,'pdf',url); flash(); render(); }
}

function exportData(){
  const b=new Blob([JSON.stringify(STATE,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(b);
  a.download='radar_data_'+new Date().toISOString().slice(0,10)+'.json'; a.click();
}
function importData(){
  const i=document.createElement('input'); i.type='file'; i.accept='.json';
  i.onchange=e=>{const r=new FileReader();r.onload=ev=>{try{STATE=JSON.parse(ev.target.result);localStorage.setItem(STORE,JSON.stringify(STATE));render();alert('Imported!');}catch{alert('Invalid file.');}};r.readAsText(e.target.files[0]);};
  i.click();
}

render();
</script>
</body>
</html>
